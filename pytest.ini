[pytest]
addopts = --capture=sys --cov=src --cov=create_release --cov=sync_version --cov=build_windows_installer --cov=locales.update_translations --cov-report=term-missing --cov-report=xml --cov-report=html
python_files = test_*.py
filterwarnings =
    ignore:builtin type SwigPyObject has no __module__ attribute:DeprecationWarning
    ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning

# NOTE: uv-managed project virtual environment required!
# Use sys capture so pytest works reliably from WSL on Windows-mounted checkouts.
